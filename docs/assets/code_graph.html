function fit(){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9,seen=0;

  x0=Math.min(x0,n.x);y0=Math.min(y0,n.y);x1=Math.max(x1,n.x);y1=Math.max(y1,n.y)}

  ctx.globalAlpha=dim?0.2:0.95;
